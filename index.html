<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color:#333;
}

.container{
    margin-top:100px;
}

h1{
    font-size:50px;
    color:#8e044d;
}

p{
    font-size:22px;
    width:60%;
    margin:auto;
}

button{
    margin-top:30px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    background:#e91e63;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}

#message{
    margin-top:25px;
    font-size:22px;
    width:70%;
    margin-left:auto;
    margin-right:auto;
    color:#4a004e;
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<p>
Celebrating the strength, courage, and beauty of women everywhere 💜
</p>

<button onclick="showMessage()">Click for a Special Message 💌</button>

<div id="message"></div>

</div>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function showMessage(){

    // Confetti Balloon Burst
    confetti({
        particleCount: 150,
        spread: 120,
        origin: { y: 0.6 }
    });

    document.getElementById("message").innerHTML =
    "You are very special to me ❤️ Happy Women's Day once again! 🌸 <br><br>" +
    "Our bond has gone through many ups and downs, but we are still together and that means a lot to me 🤝✨ <br><br>" +
    "I truly hope we always stay together like this 💫 <br><br>" +
    "Do everything that makes you happy and follow what your heart loves 😊🌷 <br><br>" +
    "Be happy, stay healthy and keep smiling always ❤️";
}

</script>

</body>
</html>
