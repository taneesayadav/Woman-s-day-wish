<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
margin-top:120px;
position:relative;
z-index:2;
}

h1{
font-size:50px;
color:#8e044d;
}

button{
margin-top:30px;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
cursor:pointer;
}

button:hover{
background:#c2185b;
}

#message{
margin-top:30px;
font-size:24px;
color:#4a004e;
width:70%;
margin-left:auto;
margin-right:auto;
}

/* Floating Hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* Balloons */

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
background:red;
border-radius:50%;
animation:rise 10s infinite;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* Flower rain */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall 7s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<button onclick="showMessage()">Click for a Special Message 💌</button>

<div id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* Typing Message */

const text = `You are very special to me ❤️ Happy Women's Day once again! 🌸

Our bond has gone through so many ups and downs, but we are still together and that means a lot to me 🤝✨

I truly hope we always stay together like this 💫

Do everything that makes you happy and follow what your heart loves 😊🌷

Be happy, stay healthy and keep smiling always ❤️`;

let i=0;

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

function showMessage(){

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

typeWriter();
}

/* Floating Hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

},500);

/* Flower Rain */

setInterval(()=>{
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
document.body.appendChild(flower);

setTimeout(()=>{flower.remove()},7000);

},700);

</script>

</body>
</html>S
